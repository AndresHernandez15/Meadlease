launch:

- arg:
    name: "base_name"
    default: "kinect2"

- node:
    pkg: "kinect2_bridge"
    exec: "kinect2_bridge_node"
    name: "kinect2_bridge_node"
    param:
        - name: "base_name"
          value: "$(var base_name)"

        - name: "sensor"
          value: ""

        - name: "publish_tf" 
          value: true  # RTAB-Map necesita los TF frames

        - name: "base_name_tf"  
          value: "$(var base_name)"

        - name: "fps_limit"  
          value: 30.0

        - name: "use_png"  
          value: false

        - name: "depth_method"  
          value: "default"

        - name: "reg_method"  
          value: "default"

        - name: "max_depth"  
          value: 12.0

        - name: "min_depth"  
          value: 0.1

        - name: "queue_size"  
          value: 2  # Optimización: reducido de 5 a 2

        - name: "bilateral_filter"  
          value: false  # Optimización: FILTRO COSTOSO DESACTIVADO

        - name: "edge_aware_filter"  
          value: false  # Optimización: FILTRO COSTOSO DESACTIVADO
          
        - name: "worker_threads"  
          value: 4

